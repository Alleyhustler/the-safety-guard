<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Safety Guard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', 'Helvetica', sans-serif;
            background: linear-gradient(45deg, #0a0a0a 0%, #1a1a1a 50%, #000 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            cursor: default;
        }

        .grain {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle, transparent 20%, rgba(255,255,255,0.02) 21%, rgba(255,255,255,0.02) 34%, transparent 35%, transparent),
                linear-gradient(0deg, rgba(255,255,255,0.01), rgba(255,255,255,0.01));
            z-index: 1;
            animation: grain 8s steps(10) infinite;
            pointer-events: none;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            30% { transform: translate(3%, -15%); }
            50% { transform: translate(12%, 9%); }
            70% { transform: translate(9%, 4%); }
            90% { transform: translate(-1%, 7%); }
        }

        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .title {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            position: relative;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.3),
                0 0 30px rgba(255, 255, 255, 0.2),
                0 0 60px rgba(255, 255, 255, 0.1);
        }

        .title::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: transparent;
            background: linear-gradient(90deg, #ff0000, #ff4500, #ff0000);
            background-clip: text;
            -webkit-background-clip: text;
            animation: glitch 3s infinite;
            z-index: -1;
        }

        @keyframes glitch {
            0%, 90%, 100% {
                transform: translate(0);
                filter: hue-rotate(0deg);
            }
            1% {
                transform: translate(2px, -2px);
                filter: hue-rotate(90deg);
            }
            2% {
                transform: translate(-2px, 2px);
                filter: hue-rotate(180deg);
            }
            3% {
                transform: translate(0);
                filter: hue-rotate(270deg);
            }
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 4rem;
            opacity: 0.8;
        }

        .guard-section {
            position: relative;
            margin: 3rem 0;
        }

        .guard-container {
            position: relative;
            display: inline-block;
        }

        .guard-image {
            width: 400px;
            height: 400px;
            object-fit: contain;
            filter: 
                contrast(1.2) 
                brightness(1.1) 
                saturate(0.9)
                drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .guard-image:hover {
            filter: 
                contrast(1.4) 
                brightness(1.3) 
                saturate(1.1)
                drop-shadow(0 0 40px rgba(255, 255, 255, 0.3));
            transform: scale(1.02);
        }

        .guard-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                45deg,
                rgba(255, 0, 0, 0.05) 0%,
                transparent 30%,
                transparent 70%,
                rgba(255, 69, 0, 0.05) 100%
            );
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .guard-container:hover .guard-overlay {
            opacity: 1;
        }

        .social-section {
            margin-top: 4rem;
            display: flex;
            gap: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 3rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .social-link:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link:active {
            transform: translateY(0);
        }

        .social-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .warning-text {
            position: absolute;
            bottom: 3rem;
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .guard-image {
                width: 300px;
                height: 300px;
            }
            
            .social-section {
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
            }
            
            .social-link {
                width: 100%;
                max-width: 280px;
                justify-content: center;
                padding: 1.2rem 2rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            
            .guard-image {
                width: 250px;
                height: 250px;
            }
            
            .tagline {
                font-size: 0.9rem;
                text-align: center;
            }
        }

        /* Noise overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8ZGVmcz4KICAgIDxmaWx0ZXIgaWQ9Im5vaXNlIj4KICAgICAgPGZlVHVyYnVsZW5jZSBiYXNlRnJlcXVlbmN5PSIwLjkiIG51bU9jdGF2ZXM9IjQiIHNlZWQ9IjIiLz4KICAgICAgPGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPgogICAgPC9maWx0ZXI+CiAgPC9kZWZzPgogIDxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNub2lzZSkiLz4KPC9zdmc+');
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="grain"></div>
    
    <div class="container">
        <h1 class="title" data-text="THE SAFETY GUARD">THE SAFETY GUARD</h1>
        <p class="tagline">Digital Enforcer</p>
        
        <div class="guard-section">
            <div class="guard-container">
                <img src="DeGen (2).png" alt="The Safety Guard" class="guard-image">
                <div class="guard-overlay"></div>
            </div>
        </div>
        
        <div class="social-section">
            <a href="https://x.com/TheSafetyGuard" class="social-link" target="_blank">
                <svg class="social-icon" viewBox="0 0 24 24">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                TWITTER
            </a>
            
            <a href="https://x.com/TheSafetyGuard" class="social-link" target="_blank">
                <svg class="social-icon" viewBox="0 0 24 24">
                    <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 9.74s9-4.19 9-9.74V7l-10-5z"/>
                </svg>
                PUMP.FUN
            </a>
            
            <a href="https://x.com/TheSafetyGuard" class="social-link" onclick="copyCA()">
                <svg class="social-icon" viewBox="0 0 24 24">
                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
                COPY CA
            </a>
        </div>
        
        <p class="warning-text">AUTHORIZED PERSONNEL ONLY</p>
    </div>

    <script>
        function copyCA() {
            const contractAddress = "YOUR_CONTRACT_ADDRESS_HERE";
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(contractAddress).then(() => {
                    showNotification("CA COPIED");
                });
            } else {
                fallbackCopyToClipboard(contractAddress);
            }
        }

        function fallbackCopyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showNotification("CA COPIED");
            } catch (err) {
                showNotification("COPY FAILED");
            }
            
            textArea.remove();
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 30px;
                right: 30px;
                background: rgba(0, 0, 0, 0.9);
                color: #ffffff;
                padding: 1rem 2rem;
                font-weight: 700;
                font-size: 0.9rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                border: 1px solid rgba(255, 255, 255, 0.2);
                z-index: 1000;
                animation: slideIn 0.3s ease;
                backdrop-filter: blur(10px);
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
